name: Update language summary

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-languages.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Generate language summary
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN }}
        run: python scripts/update_languages.py
      - name: Commit changed assets
        run: |
          if git diff --quiet -- assets; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/languages.svg assets/languages.json
          git commit -m "chore: update language summary"
          git push
